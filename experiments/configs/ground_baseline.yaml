# Ground baseline config for synthetic-only smoke test
# No real detector data. HTS/LOSA modeling to be added later.

model:
  name: cwt_autoencoder
  backbone: lstm
  input_height: 8
  input_width: 4096
  latent_dim: 32
  lstm_hidden: 64
  dropout: 0.0

preprocessing:
  cwt:
    sample_rate: 1024
    downsample_factor: 1
    target_height: 8
    target_width: 4096
    fmin: 20.0
    fmax: 512.0
    wavelet: morl

training:
  batch_size: 4
  learning_rate: 0.001
  num_epochs: 1
  optimizer: adam
  loss_function: mse

synthetic:
  n_samples: 16
  T: 4096
  sample_rate: 1024
  noise_sigma: 1e-21
  signal_amplitude: 1e-20
