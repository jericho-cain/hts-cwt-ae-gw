# Quick test: tight chirp + latent Mahalanobis

model:
  name: cwt_autoencoder
  backbone: lstm
  input_height: 8
  input_width: 4096
  latent_dim: 32
  lstm_hidden: 64
  dropout: 0.0

preprocessing:
  cwt:
    sample_rate: 1024
    downsample_factor: 8
    target_height: 8
    target_width: 4096
    fmin: 10.0
    fmax: 64.0
    wavelet: morl
    norm_mode: dataset

training:
  batch_size: 32
  learning_rate: 0.001
  num_epochs: 2
  early_stopping_patience: 5

synthetic:
  n_train: 200
  n_val: 50
  n_test: 50
  tight_chirp: true
  chirp_f_start: 12.0
  chirp_f_end: 65.0
  chirp_t_peak: 0.55
  chirp_sigma: 0.10
  chirp_jitter_pct: 0.0
  T: 32768
  sample_rate: 1024
  noise_sigma: 1e-21

data:
  T: 32768
  sample_rate: 1024
  snr: 5.0
  noise_sigma: 1e-21

experiment:
  seed: 42
  save_dir: experiments/outputs/phase0_tight_chirp_quick

phase0_losa:
  enabled: true
  f_star_hz: 40.0
  delta_phi_grid: [0.1, 1.0, 3.0, 10.0]
  n_per_bin: 50
  chirp_f_start: [12.0, 12.0]
  chirp_f_end: [65.0, 65.0]
